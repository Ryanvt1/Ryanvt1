<svg width="600" height="240" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: 600 20px monospace; fill: #58a6ff; }
    .label { font: 13px monospace; fill: #c9d1d9; }
    .bg { fill: #0d1117; stroke: #58a6ff; stroke-width: 1; rx: 12; }
  </style>

  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="10" y="10" width="580" height="220" class="bg"/>

  <text x="30" y="40" class="title" filter="url(#glow)">
    Most Used Languages
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
  </text>

  <rect x="30" y="70" width="540" height="14" rx="7" fill="#30363d"/>

  <rect x="30" y="70" width="216" height="14" fill="#3572A5"/>

  <rect x="246" y="70" width="135" height="14" fill="#4F5D95"/>

  <rect x="381" y="70" width="81" height="14" fill="#f1e05a"/>

  <rect x="462" y="70" width="38" height="14" fill="#3178c6"/>

  <rect x="500" y="70" width="27" height="14" fill="#e34c26"/>

  <rect x="527" y="70" width="22" height="14" fill="#563d7c"/>

  <rect x="549" y="70" width="21" height="14" fill="#c6538c"/>

  <text x="30" y="120" class="label">
    Python 40% • PHP 25% • JS 15% • TS 7% • HTML 5% • CSS 4% • SCSS 4%
  </text>
</svg>

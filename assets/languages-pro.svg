<svg width="600" height="260" viewBox="0 0 600 260" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: 600 20px monospace; fill: #58a6ff; }
    .label { font: 13px monospace; fill: #c9d1d9; }
    .bg { fill: #0d1117; stroke: #58a6ff; stroke-width: 1; rx: 12; }
  </style>

  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="10" y="10" width="580" height="240" class="bg"/>

  <text x="30" y="40" class="title" filter="url(#glow)">
    Most Used Languages
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
  </text>

  <rect x="30" y="70" width="540" height="14" rx="7" fill="#30363d"/>

  <rect x="30" y="70" width="351" height="14" rx="7" fill="#3572A5" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/>
  </rect>

  <rect x="381" y="70" width="189" height="14" fill="#4F5D95" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.7s" repeatCount="indefinite"/>
  </rect>

  <text x="30" y="120" class="label">Python 65%</text>
  <text x="200" y="120" class="label">PHP 35%</text>

  <text x="30" y="160" class="label">JavaScript 20%</text>
  <text x="200" y="160" class="label">TypeScript 5%</text>
  <text x="350" y="160" class="label">HTML 4%</text>

  <text x="30" y="190" class="label">CSS 3%</text>
  <text x="200" y="190" class="label">SCSS 2%</text>
</svg>
